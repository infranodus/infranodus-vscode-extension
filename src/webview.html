<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraNodus Graph</title>
    <style>
        body {
            margin: 0;
            padding: 10px 10px 14px 10px;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 14px);
        }
        .button-container {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .overlay-button {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: rgba(68, 68, 68, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.2s ease;
        }
        .overlay-button:hover {
            background: rgba(90, 90, 90, 0.95);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }
        .overlay-button::before {
            content: attr(data-tooltip);
            position: absolute;
            left: 50px;
            background: rgba(50, 50, 50, 0.95);
            color: rgba(255, 255, 255, 0.9);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s ease;
        }
        .overlay-button:hover::before {
            visibility: visible;
            opacity: 1;
        }
        .overlay-button svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        .api-key-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .iframe-container {
            position: relative;
            width: 100%;
            height: 100%;
            margin-bottom: 4px;
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .prompt-panel {
            position: absolute;
            top: 16px;
            left: 72px;
            width: min(340px, calc(100% - 92px));
            max-height: 40vh;
            display: none;
            flex-direction: column;
            background: rgba(24, 24, 28, 0.92);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 10px;
            box-shadow: 0 16px 40px -18px rgba(0, 0, 0, 0.6),
                        0 6px 16px -8px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            z-index: 1100;
            color: rgba(255, 255, 255, 0.92);
            transform: translateY(-6px);
            opacity: 0;
            transition: transform 0.18s ease, opacity 0.18s ease;
        }

        .prompt-panel.visible {
            display: flex;
            transform: translateY(0);
            opacity: 1;
        }

        .prompt-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .prompt-panel-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.78);
        }

        .prompt-panel-badge {
            display: inline-flex;
            align-items: center;
            padding: 1px 8px;
            border-radius: 999px;
            background: rgba(120, 165, 255, 0.18);
            border: 1px solid rgba(120, 165, 255, 0.32);
            color: #cfe0ff;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: none;
        }

        .prompt-panel-next {
            display: none;
            align-items: center;
            padding: 1px 7px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: rgba(255, 255, 255, 0.86);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: none;
            cursor: pointer;
        }

        .prompt-panel-next:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.24);
        }

        .prompt-panel-close {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            background: transparent;
            border: 1px solid transparent;
            color: rgba(255, 255, 255, 0.65);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
        }

        .prompt-panel-close:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.95);
        }

        .prompt-panel-close svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .prompt-panel-body {
            flex: 1 1 auto;
            min-height: 0;
            padding: 10px 12px;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-y: auto;
            overflow-x: auto;
            color: rgba(255, 255, 255, 0.86);
            font-family: var(--vscode-editor-font-family, ui-monospace, SFMono-Regular, Menlo, monospace);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.16) transparent;
        }

        .prompt-panel-body::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .prompt-panel-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .prompt-panel-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 999px;
        }
        .prompt-panel-body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.24);
        }

        .prompt-panel-body.markdown {
            white-space: normal;
            font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        }

        .prompt-panel-body.markdown h1,
        .prompt-panel-body.markdown h2,
        .prompt-panel-body.markdown h3 {
            margin: 0 0 8px 0;
            color: rgba(255, 255, 255, 0.96);
            line-height: 1.25;
        }

        .prompt-panel-body.markdown h1 { font-size: 18px; }
        .prompt-panel-body.markdown h2 { font-size: 15px; }
        .prompt-panel-body.markdown h3 { font-size: 13px; }

        .prompt-panel-body.markdown p,
        .prompt-panel-body.markdown ul,
        .prompt-panel-body.markdown ol,
        .prompt-panel-body.markdown blockquote,
        .prompt-panel-body.markdown pre {
            margin: 0 0 10px 0;
        }

        .prompt-panel-body.markdown ul,
        .prompt-panel-body.markdown ol {
            padding-left: 18px;
        }

        .prompt-panel-body.markdown li {
            margin: 3px 0;
        }

        .prompt-panel-body.markdown code {
            padding: 1px 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.08);
            font-family: var(--vscode-editor-font-family, ui-monospace, SFMono-Regular, Menlo, monospace);
            font-size: 0.95em;
        }

        .prompt-panel-body.markdown pre {
            padding: 9px 10px;
            border-radius: 7px;
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow-x: auto;
        }

        .prompt-panel-body.markdown pre code {
            padding: 0;
            background: transparent;
        }

        .prompt-panel-body.markdown blockquote {
            padding-left: 10px;
            border-left: 2px solid rgba(120, 165, 255, 0.45);
            color: rgba(255, 255, 255, 0.72);
        }

        .prompt-panel-body.markdown a {
            color: #9fc0ff;
            text-decoration: none;
        }

        .prompt-panel-body.markdown a:hover {
            text-decoration: underline;
        }

        .prompt-panel-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
            padding: 6px 8px 8px 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .prompt-panel-feedback {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.65);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .prompt-panel-feedback.visible {
            opacity: 1;
        }

        .prompt-panel-notice {
            display: none;
            padding: 7px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.72);
            font-size: 11px;
            line-height: 1.35;
            background: rgba(255, 255, 255, 0.04);
        }

        .prompt-panel-notice.visible {
            display: block;
        }

        .prompt-panel-notice.blinking {
            animation: prompt-panel-blink 1.1s ease-in-out infinite;
        }

        @keyframes prompt-panel-blink {
            0%, 100% {
                opacity: 0.45;
            }
            50% {
                opacity: 1;
            }
        }

        .prompt-panel-copy {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 7px;
            font-size: 11px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: rgba(255, 255, 255, 0.92);
            cursor: pointer;
            flex: 0 0 auto;
            white-space: nowrap;
            transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
        }

        .prompt-panel-copy:hover {
            background: rgba(255, 255, 255, 0.13);
            border-color: rgba(255, 255, 255, 0.22);
        }

        .prompt-panel-copy:active {
            transform: translateY(1px);
        }

        .prompt-panel-copy svg {
            width: 11px;
            height: 11px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>

        <iframe id="graphFrame" src="about:blank" frameborder="0"></iframe>

            <div class="prompt-panel-header">
                <div class="prompt-panel-title">
                    <span id="promptPanelTitle">AI Prompt</span>
                    <span id="promptPanelBadge" class="prompt-panel-badge">Idea</span>

                    </button>
                </div>
                <button id="promptPanelClose" class="prompt-panel-close" title="Close">

    <script>
        const vscode = acquireVsCodeApi();
        
        console.log("Activated InfraNodus Webview iFrame");
        document.addEventListener('DOMContentLoaded', (event) => {
            // Set up button click handlers
            document.getElementById('analyzeButton').addEventListener('click', () => {
                
                vscode.postMessage({
                    command: 'reload'
                });
            });

            document.getElementById('copyButton').addEventListener('click', () => {
                
                vscode.postMessage({
                    command: 'copyGraphToClipboard'
                });
            });

            document.getElementById('settingsButton').addEventListener('click', () => {
                vscode.postMessage({
                    command: 'openSettings'
                });
            });

            document.getElementById('apiKeyButton').addEventListener('click', () => {
                
                vscode.postMessage({
                    command: 'setApiKey'
                });
            });

            const promptPanel = document.getElementById('promptPanel');
            const promptPanelTitle = document.getElementById('promptPanelTitle');
            const promptPanelBadge = document.getElementById('promptPanelBadge');
            const promptPanelBody = document.getElementById('promptPanelBody');
            const promptPanelClose = document.getElementById('promptPanelClose');
            const promptPanelCopy = document.getElementById('promptPanelCopy');
            const promptPanelFind = document.getElementById('promptPanelFind');
            const promptPanelToggle = document.getElementById('promptPanelToggle');
            const promptPanelNextAdvice = document.getElementById('promptPanelNextAdvice');
            const promptPanelNotice = document.getElementById('promptPanelNotice');
            const promptPanelFeedback = document.getElementById('promptPanelFeedback');
            const contextPanel = document.getElementById('contextPanel');
            const contextPanelBody = document.getElementById('contextPanelBody');
            const contextPanelClose = document.getElementById('contextPanelClose');
            const contextPanelCopy = document.getElementById('contextPanelCopy');
            const contextPanelExport = document.getElementById('contextPanelExport');
            const contextPanelFeedback = document.getElementById('contextPanelFeedback');
            let currentPromptText = '';
            let currentResponseTexts = [];
            let currentResponseIndex = 0;
            let currentPromptLabel = 'Prompt';
            let currentPromptView = 'prompt';
            let currentAdviceRequestId = '';
            let currentModelToUse = 'gpt-5.4';
            let isAdviceLoading = false;
            let adviceError = '';
            let currentContextText = '';

            function escapeHtml(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function renderInlineMarkdown(value) {
                const codeSpans = [];
                let html = escapeHtml(value).replace(/`([^`]+)`/g, (_, code) => {
                    const token = `__CODE_SPAN_${codeSpans.length}__`;
                    codeSpans.push(`<code>${code}</code>`);
                    return token;
                });

                html = html
                    .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+|mailto:[^\s)]+)\)/g, '<a href="$2">$1</a>')
                    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*([^*]+)\*/g, '<em>$1</em>');

                codeSpans.forEach((code, index) => {
                    html = html.replace(`__CODE_SPAN_${index}__`, code);
                });

                return html;
            }

            function renderMarkdown(value) {
                const lines = String(value || '').replace(/\r\n/g, '\n').split('\n');
                const blocks = [];
                let paragraph = [];
                let listItems = [];
                let listType = '';
                let inCodeBlock = false;
                let codeLines = [];

                function flushParagraph() {
                    if (!paragraph.length) return;
                    blocks.push(`<p>${renderInlineMarkdown(paragraph.join(' '))}</p>`);
                    paragraph = [];
                }

                function flushList() {
                    if (!listItems.length) return;
                    const tag = listType === 'ol' ? 'ol' : 'ul';
                    blocks.push(`<${tag}>${listItems.map((item) => `<li>${renderInlineMarkdown(item)}</li>`).join('')}</${tag}>`);
                    listItems = [];
                    listType = '';
                }

                function flushCodeBlock() {
                    if (!codeLines.length) return;
                    blocks.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
                    codeLines = [];
                }

                for (const line of lines) {
                    if (/^\s*```/.test(line)) {
                        if (inCodeBlock) {
                            flushCodeBlock();
                            inCodeBlock = false;
                        } else {
                            flushParagraph();
                            flushList();
                            inCodeBlock = true;
                        }
                        continue;
                    }

                    if (inCodeBlock) {
                        codeLines.push(line);
                        continue;
                    }

                    if (!line.trim()) {
                        flushParagraph();
                        flushList();
                        continue;
                    }

                    const heading = line.match(/^(#{1,3})\s+(.+)$/);
                    if (heading) {
                        flushParagraph();
                        flushList();
                        blocks.push(`<h${heading[1].length}>${renderInlineMarkdown(heading[2])}</h${heading[1].length}>`);
                        continue;
                    }

                    const unorderedListItem = line.match(/^\s*[-*]\s+(.+)$/);
                    const orderedListItem = line.match(/^\s*\d+\.\s+(.+)$/);
                    if (unorderedListItem || orderedListItem) {
                        flushParagraph();
                        const nextListType = orderedListItem ? 'ol' : 'ul';
                        if (listType && listType !== nextListType) {
                            flushList();
                        }
                        listType = nextListType;
                        listItems.push((orderedListItem || unorderedListItem)[1]);
                        continue;
                    }

                    const quote = line.match(/^\s*>\s?(.+)$/);
                    if (quote) {
                        flushParagraph();
                        flushList();
                        blocks.push(`<blockquote>${renderInlineMarkdown(quote[1])}</blockquote>`);
                        continue;
                    }

                    paragraph.push(line.trim());
                }

                if (inCodeBlock) {
                    flushCodeBlock();
                }
                flushParagraph();
                flushList();

                return blocks.join('\n');
            }

            function renderPromptPanel() {
                const showingResponse = currentPromptView === 'response';
                const currentResponseText = currentResponseTexts[currentResponseIndex] || '';
                const visibleText = showingResponse ? currentResponseText : currentPromptText;
                promptPanelTitle.textContent = showingResponse ? 'AI Response' : 'AI Prompt';
                promptPanelBadge.textContent = showingResponse && currentResponseTexts.length > 1
                    ? `Response ${currentResponseIndex + 1}/${currentResponseTexts.length}`
                    : showingResponse ? 'Response' : currentPromptLabel;
                if (showingResponse) {
                    promptPanelBody.classList.add('markdown');
                    promptPanelBody.innerHTML = renderMarkdown(visibleText);
                } else {
                    promptPanelBody.classList.remove('markdown');
                    promptPanelBody.textContent = visibleText;
                }
                promptPanelFind.style.display = !showingResponse ? 'inline-flex' : 'none';
                promptPanelToggle.style.display = currentResponseTexts.length > 0 ? 'inline-flex' : 'none';
                promptPanelToggle.textContent = showingResponse ? 'Show Prompt' : 'AI Response';
                promptPanelNextAdvice.style.display = showingResponse && currentResponseTexts.length > 1 ? 'inline-flex' : 'none';
                promptPanelNextAdvice.textContent = 'Next';
                promptPanelCopy.title = showingResponse ? 'Copy response to clipboard' : 'Copy prompt to clipboard';

                if (isAdviceLoading) {
                    promptPanelNotice.textContent = `Getting response from ${currentModelToUse}...`;
                    promptPanelNotice.classList.add('visible');
                    promptPanelNotice.classList.add('blinking');
                } else if (adviceError) {
                    promptPanelNotice.textContent = adviceError;
                    promptPanelNotice.classList.add('visible');
                    promptPanelNotice.classList.remove('blinking');
                } else {
                    promptPanelNotice.textContent = '';
                    promptPanelNotice.classList.remove('visible');
                    promptPanelNotice.classList.remove('blinking');
                }

                promptPanelBody.scrollTop = 0;
            }

            function showPromptPanel({ label, action, prompt, canFindInFiles, adviceRequestId, isAdviceLoading: loadingAdvice, modelToUse }) {
                currentPromptText = prompt || '';
                currentResponseTexts = [];
                currentResponseIndex = 0;
                currentPromptLabel = label || action || 'Prompt';
                currentPromptView = 'prompt';
                currentAdviceRequestId = adviceRequestId || '';
                currentModelToUse = modelToUse || 'gpt-5.4';
                isAdviceLoading = !!loadingAdvice;
                adviceError = '';
                renderPromptPanel();
                contextPanel.classList.remove('visible');
                promptPanel.classList.add('visible');
            }

            function showGraphAiAdvice({ adviceRequestId, responses }) {
                if (adviceRequestId && currentAdviceRequestId && adviceRequestId !== currentAdviceRequestId) {
                    return;
                }
                currentResponseTexts = Array.isArray(responses)
                    ? responses.filter(Boolean)
                    : [];
                currentResponseIndex = 0;
                currentPromptView = 'response';
                isAdviceLoading = false;
                adviceError = '';
                renderPromptPanel();
                promptPanel.classList.add('visible');
            }

            function showGraphAiAdviceError({ adviceRequestId, error }) {
                if (adviceRequestId && currentAdviceRequestId && adviceRequestId !== currentAdviceRequestId) {
                    return;
                }
                isAdviceLoading = false;
                adviceError = error ? `Could not load response: ${error}` : 'Could not load response.';
                renderPromptPanel();
            }

            function hidePromptPanel() {
                promptPanel.classList.remove('visible');
            }

            function showContextPanel({ contextText }) {
                currentContextText = contextText || '';
                contextPanelBody.textContent = currentContextText || 'No analyzed context available yet. Analyze a document first.';
                promptPanel.classList.remove('visible');
                contextPanel.classList.add('visible');
                contextPanelBody.scrollTop = 0;
            }

            function hideContextPanel() {
                contextPanel.classList.remove('visible');
            }

            promptPanelClose.addEventListener('click', hidePromptPanel);
            contextPanelClose.addEventListener('click', hideContextPanel);

            promptPanelCopy.addEventListener('click', async () => {
                const currentResponseText = currentResponseTexts[currentResponseIndex] || '';
                const textToCopy = currentPromptView === 'response' ? currentResponseText : currentPromptText;
                if (!textToCopy) return;
                try {
                    await navigator.clipboard.writeText(textToCopy);
                    promptPanelFeedback.classList.add('visible');
                    setTimeout(() => promptPanelFeedback.classList.remove('visible'), 1500);
                } catch (err) {
                    console.error('Failed to copy prompt panel content:', err);
                }
            });

            promptPanelFind.addEventListener('click', () => {
                vscode.postMessage({ command: 'findInFiles' });
            });

            promptPanelToggle.addEventListener('click', () => {
                if (currentResponseTexts.length === 0) return;
                currentPromptView = currentPromptView === 'response' ? 'prompt' : 'response';
                renderPromptPanel();
            });

            promptPanelNextAdvice.addEventListener('click', () => {
                if (currentResponseTexts.length <= 1) return;
                currentResponseIndex = (currentResponseIndex + 1) % currentResponseTexts.length;
                renderPromptPanel();
            });

            contextPanelCopy.addEventListener('click', async () => {
                if (!currentContextText) return;
                try {
                    await navigator.clipboard.writeText(currentContextText);
                    contextPanelFeedback.classList.add('visible');
                    setTimeout(() => contextPanelFeedback.classList.remove('visible'), 1500);
                } catch (err) {
                    console.error('Failed to copy analyzed context:', err);
                }
            });

            contextPanelExport.addEventListener('click', () => {
                vscode.postMessage({ command: 'exportAnalyzedContextToInfraNodus' });
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && promptPanel.classList.contains('visible')) {
                    hidePromptPanel();
                }
                if (e.key === 'Escape' && contextPanel.classList.contains('visible')) {
                    hideContextPanel();
                }
            });

            // Listen for messages from the iframe
            window.addEventListener('message', event => {
                const message = event.data;
                
                // Log all messages from iframe
                // console.log('Message from iframe for webview:', message);

                

                if (message.type === 'LOAD_JSON') {

                    if (message.payload && message.payload.error) {
                        vscode.postMessage({
                            command: 'showError',
                            error: message.payload.error
                        });
                        return;
                    }
                    // Store the data in vscode state
                    const currentState = vscode.getState() || {};
                    vscode.setState({ 
                        ...currentState,
                        graphData: message.payload 
                    });
                    
                    // Forward the message to the iframe
                    document.getElementById('graphFrame').contentWindow.postMessage({
                        type: 'LOAD_JSON',
                        payload: message.payload
                    }, '*');
                }

                if (message.type === 'UPDATE_SELECTED_NODES') {
                    
                    vscode.postMessage({
                        command: 'forwardToClipboard',
                        type: 'UPDATE_SELECTED_NODES',
                        payload: {
                            selectedNodes: message.payload, // for compability with the old iframe API version
                            connectedNodes: message.connectedNodes
                        }
                    });
                    
                }

                if (message.type === 'UPDATE_GROUPS') {
                    
                    vscode.postMessage({
                        command: 'forwardToClipboard',
                        type: 'UPDATE_GROUPS',
                        payload: {
                            selectedClusters: message.payload,
                        }
                    });
                    
                }

                if (message.type === 'EXTERNAL_ACTION') {
                    
                    vscode.postMessage({
                        command: 'processExternalAction',
                        type: 'EXTERNAL_ACTION',
                        payload: {
                            action: message.payload
                        }
                    });
                    
                }
             
            });

            // Add this to capture iframe's console logs
            const iframe = document.getElementById('graphFrame');
            iframe.onload = () => {
                // Inject console logger into iframe
                iframe.contentWindow?.postMessage({
                    type: 'INJECT_LOGGER',
                    payload: `
                        (function() {
                            const originalConsole = {
                                log: console.log,
                                warn: console.warn,
                                error: console.error,
                                info: console.info,
                                debug: console.debug
                            };

                            function wrapConsole(method) {
                                return function(...args) {
                                    // Call original console method
                                    originalConsole[method].apply(console, args);
                                    // Forward to parent
                                    window.parent.postMessage({
                                        type: 'CONSOLE_LOG',
                                        method: method,
                                        args: args.map(arg => 
                                            arg instanceof Error ? arg.toString() : arg
                                        )
                                    }, '*');
                                };
                            }

                            // Wrap each console method
                            console.log = wrapConsole('log');
                            console.warn = wrapConsole('warn');
                            console.error = wrapConsole('error');
                            console.info = wrapConsole('info');
                            console.debug = wrapConsole('debug');
                        })();
                    `
                }, '*');
            };

            // Handle forwarded console logs
            window.addEventListener('message', event => {
                const message = event.data;
                if (message.type === 'CONSOLE_LOG') {
                    const { method, args } = message;
                    switch (method) {
                        case 'log':
                            console.log('[iframe]:', ...args);
                            break;
                        case 'warn':
                            console.warn('[iframe]:', ...args);
                            break;
                        case 'error':
                            console.error('[iframe]:', ...args);
                            break;
                        case 'info':
                            console.info('[iframe]:', ...args);
                            break;
                        case 'debug':
                            console.debug('[iframe]:', ...args);
                            break;
                    }
                } else if (message.type === 'SET_IFRAME_URL') {
                    const iframeUrl = message.url + '?iframe=true&app=vscode' + (message.userId ? '&user=' + message.userId : '');
                    // Store the URL using vscode state
                    vscode.setState({ infraNodusIframeUrl: iframeUrl });
                    document.getElementById('graphFrame').src = iframeUrl;
                }
            });

            // Handle messages from the extension
            window.addEventListener('message', event => {
                const message = event.data;
                switch (message.command) {
                    case 'setContent':
                        document.getElementById('graphFrame').src = message.url;
                        break;
                    case 'showLoading':
                        document.getElementById('loadingOverlay').style.display = 'flex';
                        break;
                    case 'hideLoading':
                        document.getElementById('loadingOverlay').style.display = 'none';
                        break;
                    case 'showPrompt':
                        console.log('[InfraNodus] webview showPrompt received', {
                            action: message.action,
                            promptLength: message.prompt ? message.prompt.length : 0,
                            canFindInFiles: message.canFindInFiles
                        });
                        showPromptPanel({
                            label: message.label,
                            action: message.action,
                            prompt: message.prompt,
                            canFindInFiles: message.canFindInFiles,
                            adviceRequestId: message.adviceRequestId,
                            isAdviceLoading: message.isAdviceLoading,
                            modelToUse: message.modelToUse
                        });
                        break;
                    case 'showGraphAiAdvice':
                        showGraphAiAdvice({
                            adviceRequestId: message.adviceRequestId,
                            responses: message.responses
                        });
                        break;
                    case 'showGraphAiAdviceError':
                        showGraphAiAdviceError({
                            adviceRequestId: message.adviceRequestId,
                            error: message.error
                        });
                        break;
                    case 'showAnalyzedContext':
                        showContextPanel({
                            contextText: message.contextText
                        });
                        break;
                }
            });
        });

        // Restore iframe URL and graph data from vscode state on page load
        const state = vscode.getState();
        // console.log("Initial state:", state);
        const storedIframeUrl = state?.infraNodusIframeUrl;
        const storedGraphData = state?.graphData;
        let hasRestoredData = false;  // Flag to prevent multiple restorations
        
        if (storedIframeUrl) {
            // console.log("Setting iframe URL:", storedIframeUrl);
            document.getElementById('graphFrame').src = storedIframeUrl;
        }

        // Function to send graph data to iframe
        function sendGraphDataToIframe() {
            if (hasRestoredData || !storedGraphData) return;
            
            // console.log("Sending graph data to iframe:", storedGraphData);
            const iframe = document.getElementById('graphFrame');
            if (iframe && iframe.contentWindow) {
                // Try both message types to see which one works
                iframe.contentWindow.postMessage({
                    type: 'LOAD_JSON',
                    payload: storedGraphData
                }, '*');

                vscode.postMessage({
                    command: 'refreshGraphStats',
                    type: 'REFRESH_GRAPH',
                });
                // console.log("Sent LOAD_JSON message to iframe");

                // Also try UPDATE_GRAPH as backup
                // TODO use if there's a problem with webview reload
                // setTimeout(() => {
                //     iframe.contentWindow.postMessage({
                //         type: 'UPDATE_GRAPH',
                //         payload: storedGraphData
                //     }, '*');
                //     console.log("Sent UPDATE_GRAPH message to iframe");
                // }, 500);
                
                hasRestoredData = true;
            }
        }

        window.addEventListener('message', event => {
            const message = event.data;
            
            // Log all messages from iframe with their full content
            // console.log('Webview received message:', {
            //     type: message.type,
            //     payload: message.payload,
            //     fullMessage: message
            // });

            // Listen for READY message from iframe
            if (message.type === 'READY') {
                // console.log('Iframe is ready, sending stored data');
                sendGraphDataToIframe();
            }

            switch (message.type) {
                case 'PROCESSING_START':
                    // Update UI to show processing state
                    document.getElementById('graphFrame').style.opacity = '0.5';
                    break;

                case 'PROCESSING_COMPLETE':
                    // Restore UI
                    document.getElementById('graphFrame').style.opacity = '1';
                    break;

                case 'PROCESSING_ERROR':
                    // Handle error state
                    document.getElementById('graphFrame').style.opacity = '1';
                    console.error('Processing error:', message.error);
                    break;

                case 'LOAD_JSON':
                    // Update the iframe with new data and persist it
                    // console.log("LOAD_JSON EVENT received with payload:", message.payload)
                    const iframe = document.getElementById('graphFrame');
                    if (iframe && iframe.contentWindow) {
                        // Store the data in vscode state
                        const currentState = vscode.getState() || {};
                        vscode.setState({ 
                            ...currentState,
                            graphData: message.payload 
                        });
                        // console.log("Updated state with new graph data:", message.payload);
                        
                        iframe.contentWindow.postMessage({
                            type: 'LOAD_JSON',  // Changed to match the original type
                            payload: message.payload
                        }, '*');
                        // console.log("Forwarded LOAD_JSON to iframe");

                        vscode.postMessage({
                            command: 'refreshGraphStats',
                            type: 'REFRESH_GRAPH',
                        });
                    }
                    break;
            }
        });
    </script>
</body>
</html>
